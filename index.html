<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>吃了么</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FFF0EB;
            --primary-dark: #E85A2D;
            --secondary: #FFB627;
            --bg: #F7F8FA;
            --card-bg: #ffffff;
            --text: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #F0F0F0;
            --success: #07C160;
            --success-light: #E8F5E9;
            --warning: #FAAD14;
            --danger: #FF4D4F;
            --tab-active: #FF6B35;
            --tab-inactive: #999999;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* 小程序容器 */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 430px;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.08);
        }

        /* 顶部导航栏 */
        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
            padding-top: env(safe-area-inset-top);
        }

        .nav-bar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            transform: scaleY(0.5);
        }

        .nav-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        /* 内容区 */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .content::-webkit-scrollbar { display: none; }

        .page {
            display: none;
            min-height: 100%;
            padding: 12px 16px 20px;
            animation: pageIn 0.2s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title-icon {
            font-size: 18px;
        }

        /* 分类标签 */
        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: inherit;
            user-select: none;
        }

        .tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 热量筛选 */
        .calorie-filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cal-tag {
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: inherit;
            user-select: none;
        }

        .cal-tag.active-all {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .cal-tag.active-low {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .cal-tag.active-medium {
            background: #F5A623;
            color: white;
            border-color: #F5A623;
        }

        .cal-tag.active-high {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .cal-tag.active-very-high {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* 抽取区 */
        .draw-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .draw-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .draw-card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .draw-label {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .draw-result {
            font-size: 36px;
            font-weight: 900;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .draw-result.spinning {
            animation: pulse 0.15s ease infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        .draw-calorie {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        .draw-btn {
            width: 100%;
            background: var(--card-bg);
            color: var(--primary);
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .draw-btn:active {
            transform: scale(0.97);
        }

        .draw-btn:disabled {
            opacity: 0.8;
        }

        /* 我的页面 - 统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-num {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* 食物 chips */
        .category-group {
            margin-bottom: 16px;
        }

        .category-group:last-child {
            margin-bottom: 0;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--border);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .category-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .category-arrow {
            font-size: 12px;
            color: var(--text-tertiary);
            transition: transform 0.25s ease;
            display: inline-block;
            margin-left: 2px;
        }

        .category-arrow.expanded {
            transform: rotate(90deg);
        }

        .category-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .category-body.expanded {
            max-height: 1000px;
        }

        .category-count {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .category-add-btn {
            background: none;
            border: 1.5px dashed var(--border);
            color: var(--primary);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-add-btn:active {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        /* 内联添加行 */
        .inline-add-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            padding: 10px;
            background: var(--primary-light);
            border-radius: 12px;
            animation: chipIn 0.2s ease;
        }

        .inline-add-row input {
            flex: 1;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            background: var(--card-bg);
        }

        .inline-add-row input:focus {
            border-color: var(--primary);
        }

        .inline-add-row input[type="number"] {
            width: 68px;
            flex: none;
        }

        .inline-add-confirm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        .inline-add-confirm:active {
            opacity: 0.85;
        }

        .inline-add-cancel {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-tertiary);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        .food-chip {
            background: var(--bg);
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            animation: chipIn 0.2s ease;
        }

        @keyframes chipIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .food-chip .cal-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }

        .food-chip .cal-badge.low { background: var(--success-light); color: var(--success); }
        .food-chip .cal-badge.medium { background: #FFF7E6; color: #F5A623; }
        .food-chip .cal-badge.high { background: var(--primary-light); color: var(--primary); }
        .food-chip .cal-badge.very-high { background: #FFF1F0; color: var(--danger); }

        .food-chip .remove {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .food-chip .remove:active {
            background: var(--danger);
            color: white;
        }

        /* 历史记录 */
        .history-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar { display: none; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-food {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
        }

        .history-time {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .clear-btn {
            width: 100%;
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-tertiary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .clear-btn:active {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-tertiary);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 底部 Tab 栏 */
        .tab-bar {
            display: flex;
            height: 56px;
            background: var(--card-bg);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            transform: scaleY(0.5);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .tab-item.active .tab-icon {
            color: var(--tab-active);
        }

        .tab-item.active .tab-label {
            color: var(--tab-active);
            font-weight: 700;
        }

        .tab-icon {
            font-size: 22px;
            color: var(--tab-inactive);
            transition: all 0.2s;
        }

        .tab-label {
            font-size: 10px;
            color: var(--tab-inactive);
            transition: all 0.2s;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-sheet {
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 32px;
            text-align: center;
            width: 100%;
            max-width: 430px;
            transform: translateY(100%);
            transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .modal-overlay.show .modal-sheet {
            transform: translateY(0);
        }

        .modal-emoji {
            font-size: 56px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .modal-food {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin: 8px 0;
        }

        .modal-calorie-box {
            background: var(--bg);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0 20px;
        }

        .modal-calorie-bar-bg {
            background: #E8E8E8;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }

        .modal-calorie-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            min-width: 50px;
        }

        .modal-calorie-bar.low { background: var(--success); }
        .modal-calorie-bar.medium { background: #F5A623; }
        .modal-calorie-bar.high { background: var(--primary); }
        .modal-calorie-bar.very-high { background: var(--danger); }

        .modal-calorie-text {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .modal-calorie-text.low { color: var(--success); }
        .modal-calorie-text.medium { color: #F5A623; }
        .modal-calorie-text.high { color: var(--primary); }
        .modal-calorie-text.very-high { color: var(--danger); }

        .modal-close {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .modal-close:active {
            transform: scale(0.98);
        }

        /* 提示 toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 隐藏滚动条但保持可滚动 */
        .content { scrollbar-width: none; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <div class="nav-bar">
            <div class="nav-title" id="navTitle">吃了么</div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 选择页面 -->
            <div class="page active" id="pageChoose">
                <!-- 抽取卡片 -->
                <div class="draw-card">
                    <div class="draw-label">今日推荐</div>
                    <div class="draw-result" id="drawResult">点击开始抽取</div>
                    <div class="draw-calorie" id="drawCalorie"></div>
                    <button class="draw-btn" id="drawBtn">开始抽取</button>
                </div>

                <!-- 分类筛选 -->
                <div class="card">
                    <div class="card-title"><span class="card-title-icon">🍱</span> 食物分类</div>
                    <div class="tag-grid" id="categoryTags">
                        <button class="tag active" data-category="炒菜">炒菜</button>
                        <button class="tag active" data-category="烧腊">烧腊</button>
                        <button class="tag active" data-category="猪脚饭">猪脚饭</button>
                        <button class="tag active" data-category="粉面">粉面</button>
                        <button class="tag active" data-category="粥">粥</button>
                        <button class="tag active" data-category="快餐">快餐</button>
                        <button class="tag active" data-category="小吃">小吃</button>
                        <button class="tag active" data-category="火锅">火锅</button>
                    </div>
                </div>

                <!-- 热量筛选 -->
                <div class="card">
                    <div class="card-title"><span class="card-title-icon">🔥</span> 热量区间</div>
                    <div class="calorie-filter-grid" id="calRangeTags">
                        <button class="cal-tag active-all" data-range="all">不限</button>
                        <button class="cal-tag" data-range="low">0-250 kcal</button>
                        <button class="cal-tag" data-range="medium">251-500 kcal</button>
                        <button class="cal-tag" data-range="high">501-750 kcal</button>
                        <button class="cal-tag" data-range="very-high">750+ kcal</button>
                    </div>
                </div>
            </div>

            <!-- 我的页面 -->
            <div class="page" id="pageMine">
                <!-- 统计 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-num" id="statTotal">0</div>
                        <div class="stat-label">收录食物</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statHistory">0</div>
                        <div class="stat-label">抽取次数</div>
                    </div>
                </div>

                <!-- 食物列表（按分类分组） -->
                <div class="card">
                    <div class="card-title"><span class="card-title-icon">🍽️</span> 食物列表</div>
                    <div id="foodList"></div>
                </div>

                <!-- 历史记录 -->
                <div class="card">
                    <div class="card-title"><span class="card-title-icon">📜</span> 抽取历史</div>
                    <div class="history-list" id="historyList">
                        <div class="empty-state">
                            <div class="emoji">🍽️</div>
                            <p>还没有抽取记录</p>
                        </div>
                    </div>
                    <button class="clear-btn" id="clearHistory">清空历史</button>
                </div>
            </div>
        </div>

        <!-- 底部 Tab 栏 -->
        <div class="tab-bar">
            <div class="tab-item active" data-tab="choose">
                <div class="tab-icon">🎲</div>
                <div class="tab-label">选择</div>
            </div>
            <div class="tab-item" data-tab="mine">
                <div class="tab-icon">👤</div>
                <div class="tab-label">我的</div>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet">
            <div class="modal-emoji">🎉</div>
            <div class="modal-title">今天推荐你吃</div>
            <div class="modal-food" id="modalFood"></div>
            <div class="modal-calorie-box">
                <div class="modal-calorie-bar-bg">
                    <div class="modal-calorie-bar" id="modalCalorieBar" style="width:0%"></div>
                </div>
                <div class="modal-calorie-text" id="modalCalorieText"></div>
            </div>
            <button class="modal-close" id="modalClose">确定</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== 数据 =====
        const defaultFoods = {
            '炒菜': [
                { name: '宫保鸡丁', cal: 320 }, { name: '鱼香肉丝', cal: 280 },
                { name: '麻婆豆腐', cal: 220 }, { name: '回锅肉', cal: 380 },
                { name: '糖醋里脊', cal: 350 }, { name: '青椒肉丝', cal: 250 },
                { name: '番茄炒蛋', cal: 180 }, { name: '酸辣土豆丝', cal: 150 },
                { name: '蒜蓉西兰花', cal: 120 }, { name: '干煸豆角', cal: 200 }
            ],
            '烧腊': [
                { name: '烧鸭饭', cal: 650 }, { name: '叉烧饭', cal: 580 },
                { name: '烧鹅饭', cal: 720 }, { name: '脆皮烧肉', cal: 450 },
                { name: '蜜汁鸡翅', cal: 280 }, { name: '卤水拼盘', cal: 400 },
                { name: '烧腊双拼', cal: 680 }, { name: '玫瑰油鸡', cal: 350 }
            ],
            '猪脚饭': [
                { name: '隆江猪脚饭', cal: 750 }, { name: '卤猪蹄饭', cal: 700 },
                { name: '红烧猪脚', cal: 680 }, { name: '酱香猪脚', cal: 720 },
                { name: '猪脚拼烧鸭', cal: 850 }
            ],
            '粉面': [
                { name: '兰州拉面', cal: 520 }, { name: '重庆小面', cal: 450 },
                { name: '螺蛳粉', cal: 480 }, { name: '桂林米粉', cal: 420 },
                { name: '酸辣粉', cal: 400 }, { name: '牛肉面', cal: 550 },
                { name: '炸酱面', cal: 500 }, { name: '云吞面', cal: 380 },
                { name: '热干面', cal: 460 }, { name: '刀削面', cal: 530 }
            ],
            '粥': [
                { name: '皮蛋瘦肉粥', cal: 220 }, { name: '海鲜粥', cal: 280 },
                { name: '白粥配咸菜', cal: 150 }, { name: '南瓜粥', cal: 130 },
                { name: '八宝粥', cal: 200 }, { name: '小米粥', cal: 110 },
                { name: '及第粥', cal: 250 }
            ],
            '快餐': [
                { name: '汉堡套餐', cal: 850 }, { name: '炸鸡', cal: 400 },
                { name: '披萨', cal: 680 }, { name: '寿司', cal: 350 },
                { name: '三明治', cal: 320 }, { name: '盖浇饭', cal: 650 },
                { name: '木桶饭', cal: 700 }
            ],
            '小吃': [
                { name: '煎饼果子', cal: 350 }, { name: '肉夹馍', cal: 380 },
                { name: '烤冷面', cal: 300 }, { name: '关东煮', cal: 250 },
                { name: '串串香', cal: 450 }, { name: '烧烤', cal: 550 },
                { name: '臭豆腐', cal: 220 }, { name: '凉皮', cal: 180 }
            ],
            '火锅': [
                { name: '重庆火锅', cal: 900 }, { name: '潮汕牛肉火锅', cal: 750 },
                { name: '老北京涮羊肉', cal: 800 }, { name: '椰子鸡', cal: 600 },
                { name: '猪肚鸡', cal: 650 }, { name: '麻辣烫', cal: 550 }
            ]
        };

        // ===== 工具函数 =====
        function getCalorieLevel(cal) {
            if (cal <= 250) return { level: 'low', label: '轻盈低卡', desc: '适合控制体重' };
            if (cal <= 500) return { level: 'medium', label: '适中均衡', desc: '日常正餐水平' };
            if (cal <= 750) return { level: 'high', label: '热量较高', desc: '注意适量食用' };
            return { level: 'very-high', label: '热量爆表', desc: '偶尔放纵一下' };
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1800);
        }

        // ===== 状态 =====
        let foods = JSON.parse(JSON.stringify(defaultFoods));
        let history = JSON.parse(localStorage.getItem('foodHistory') || '[]');
        let activeCategories = new Set(Object.keys(foods));
        let activeCalRanges = new Set(['all']);
        let isSpinning = false;
        let currentTab = 'choose';

        // ===== DOM =====
        const drawResult = document.getElementById('drawResult');
        const drawCalorie = document.getElementById('drawCalorie');
        const drawBtn = document.getElementById('drawBtn');
        const foodList = document.getElementById('foodList');
        const historyList = document.getElementById('historyList');
        const clearHistory = document.getElementById('clearHistory');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalFood = document.getElementById('modalFood');
        const modalCalorieBar = document.getElementById('modalCalorieBar');
        const modalCalorieText = document.getElementById('modalCalorieText');
        const modalClose = document.getElementById('modalClose');
        const navTitle = document.getElementById('navTitle');
        const statTotal = document.getElementById('statTotal');
        const statHistory = document.getElementById('statHistory');

        // ===== Tab 切换 =====
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                if (target === currentTab) return;
                currentTab = target;

                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page' + (target === 'choose' ? 'Choose' : 'Mine')).classList.add('active');

                navTitle.textContent = target === 'choose' ? '吃了么' : '我的';

                if (target === 'mine') {
                    updateStats();
                }
            });
        });

        // ===== 分类标签 =====
        document.querySelectorAll('#categoryTags .tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const cat = tag.dataset.category;
                if (activeCategories.has(cat)) {
                    activeCategories.delete(cat);
                    tag.classList.remove('active');
                } else {
                    activeCategories.add(cat);
                    tag.classList.add('active');
                }
            });
        });

        // ===== 热量筛选 =====
        document.querySelectorAll('#calRangeTags .cal-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const range = tag.dataset.range;
                document.querySelectorAll('#calRangeTags .cal-tag').forEach(t => t.className = 'cal-tag');
                if (range === 'all') {
                    activeCalRanges.clear();
                    activeCalRanges.add('all');
                    tag.classList.add('active-all');
                } else {
                    activeCalRanges.delete('all');
                    if (activeCalRanges.has(range)) activeCalRanges.delete(range);
                    else activeCalRanges.add(range);
                    if (activeCalRanges.size === 0) activeCalRanges.add('all');
                    document.querySelectorAll('#calRangeTags .cal-tag').forEach(t => {
                        const r = t.dataset.range;
                        if (activeCalRanges.has(r)) t.classList.add('active-' + r);
                    });
                }
            });
        });

        // ===== 热量匹配 =====
        function matchesCalRange(cal) {
            if (activeCalRanges.has('all')) return true;
            return activeCalRanges.has(getCalorieLevel(cal).level);
        }

        // ===== 统计 =====
        function updateStats() {
            let total = 0;
            Object.values(foods).forEach(arr => total += arr.length);
            statTotal.textContent = total;
            statHistory.textContent = history.length;
        }

        // ===== 抽取 =====
        function draw() {
            if (isSpinning) return;
            if (activeCategories.size === 0) {
                showToast('请至少选择一个分类');
                return;
            }

            const pool = [];
            activeCategories.forEach(cat => {
                if (foods[cat]) {
                    foods[cat].forEach(f => {
                        const obj = typeof f === 'object' ? f : { name: f, cal: 0 };
                        if (matchesCalRange(obj.cal)) pool.push(obj);
                    });
                }
            });

            if (pool.length === 0) {
                showToast('没有符合条件的食物');
                return;
            }

            isSpinning = true;
            drawBtn.disabled = true;
            drawBtn.textContent = '抽取中...';
            drawResult.classList.add('spinning');
            drawCalorie.textContent = '';

            let count = 0;
            const maxCount = 22;
            const interval = setInterval(() => {
                const item = pool[Math.floor(Math.random() * pool.length)];
                drawResult.textContent = item.name;
                count++;
                if (count >= maxCount) {
                    clearInterval(interval);
                    finalize(item);
                }
            }, 70);
        }

        function finalize(foodObj) {
            isSpinning = false;
            drawBtn.disabled = false;
            drawBtn.textContent = '再次抽取';
            drawResult.classList.remove('spinning');

            const cl = getCalorieLevel(foodObj.cal);
            drawCalorie.textContent = `${foodObj.cal} kcal · ${cl.label}`;

            // 历史
            const now = new Date();
            const timeStr = `${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            history.push({ food: foodObj.name, cal: foodObj.cal, time: timeStr });
            if (history.length > 50) history.shift();
            localStorage.setItem('foodHistory', JSON.stringify(history));
            renderHistory();

            // 弹窗
            modalFood.textContent = foodObj.name;
            const pct = Math.min(Math.max(foodObj.cal / 10, 8), 100);
            modalCalorieBar.style.width = '0%';
            modalCalorieBar.className = 'modal-calorie-bar ' + cl.level;
            modalCalorieBar.textContent = foodObj.cal + ' kcal';
            modalCalorieText.className = 'modal-calorie-text ' + cl.level;
            modalCalorieText.textContent = `${cl.label} · ${cl.desc}`;
            modalOverlay.classList.add('show');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => { modalCalorieBar.style.width = pct + '%'; });
            });
        }

        // ===== 食物列表 =====
        // ===== 食物列表（按分类分组渲染） =====
        const categoryEmojis = {
            '炒菜': '🍳', '烧腊': '🦆', '猪脚饭': '🍖', '粉面': '🍜',
            '粥': '🥣', '快餐': '🍔', '小吃': '🥟', '火锅': '🍲'
        };

        function renderFoodList() {
            foodList.innerHTML = '';
            Object.entries(foods).forEach(([category, items]) => {
                const group = document.createElement('div');
                group.className = 'category-group';
                group.id = 'catGroup_' + category;

                const emoji = categoryEmojis[category] || '🍱';
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <div class="category-name">${emoji} ${category} <span class="category-count">(${items.length})</span><span class="category-arrow">›</span></div>
                    <button class="category-add-btn" onclick="event.stopPropagation(); showInlineAdd('${category}')">+ 添加</button>
                `;
                header.addEventListener('click', () => toggleCategory(category));
                group.appendChild(header);

                // 折叠体（默认收起）
                const body = document.createElement('div');
                body.className = 'category-body';
                body.id = 'catBody_' + category;

                const chipGrid = document.createElement('div');
                chipGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;';
                chipGrid.id = 'chipGrid_' + category;

                items.forEach(f => {
                    const info = typeof f === 'object' ? f : { name: f, cal: 0 };
                    const cl = getCalorieLevel(info.cal);
                    const chip = document.createElement('div');
                    chip.className = 'food-chip';
                    chip.innerHTML = `
                        <span>${info.name}</span>
                        <span class="cal-badge ${cl.level}">${info.cal}</span>
                        <button class="remove" onclick="removeFood('${category}', '${info.name}')">&times;</button>
                    `;
                    chipGrid.appendChild(chip);
                });

                body.appendChild(chipGrid);
                group.appendChild(body);
                foodList.appendChild(group);
            });
        }

        // 折叠/展开分类
        window.toggleCategory = function(category) {
            const body = document.getElementById('catBody_' + category);
            const group = document.getElementById('catGroup_' + category);
            const arrow = group.querySelector('.category-arrow');
            const isExpanded = body.classList.contains('expanded');
            body.classList.toggle('expanded');
            arrow.classList.toggle('expanded');
        };

        // 显示内联添加行
        window.showInlineAdd = function(category) {
            // 先展开分类
            const body = document.getElementById('catBody_' + category);
            const group = document.getElementById('catGroup_' + category);
            const arrow = group.querySelector('.category-arrow');
            if (!body.classList.contains('expanded')) {
                body.classList.add('expanded');
                arrow.classList.add('expanded');
            }

            // 如果已有添加行就先移除
            const existing = document.getElementById('inlineAdd_' + category);
            if (existing) { existing.remove(); return; }

            const addRow = document.createElement('div');
            addRow.className = 'inline-add-row';
            addRow.id = 'inlineAdd_' + category;
            addRow.innerHTML = `
                <input type="text" placeholder="食物名称" maxlength="20" id="inlineName_${category}">
                <input type="number" placeholder="kcal" min="0" max="3000" id="inlineCal_${category}">
                <button class="inline-add-confirm" onclick="confirmInlineAdd('${category}')">确定</button>
                <button class="inline-add-cancel" onclick="cancelInlineAdd('${category}')">取消</button>
            `;
            group.appendChild(addRow);

            // 自动聚焦
            setTimeout(() => {
                document.getElementById('inlineName_' + category).focus();
            }, 100);
        };

        window.confirmInlineAdd = function(category) {
            const nameInput = document.getElementById('inlineName_' + category);
            const calInput = document.getElementById('inlineCal_' + category);
            const name = nameInput.value.trim();
            const cal = parseInt(calInput.value) || 0;

            if (!name) { showToast('请输入食物名称'); nameInput.focus(); return; }

            if (!foods[category]) foods[category] = [];
            if (foods[category].some(f => (typeof f === 'object' ? f.name : f) === name)) {
                showToast('该食物已存在'); return;
            }

            foods[category].push({ name, cal });
            renderFoodList();
            updateStats();
            showToast('添加成功');
        };

        window.cancelInlineAdd = function(category) {
            const el = document.getElementById('inlineAdd_' + category);
            if (el) el.remove();
        };

        // ===== 历史 =====
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🍽️</div>
                        <p>还没有抽取记录</p>
                    </div>
                `;
                return;
            }
            historyList.innerHTML = '';
            [...history].reverse().forEach(h => {
                const cl = h.cal ? getCalorieLevel(h.cal) : null;
                const badge = cl ? `<span class="cal-badge ${cl.level}" style="font-size:10px;padding:2px 6px;border-radius:6px;">${h.cal}</span>` : '';
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-left">
                        <span class="history-food">${h.food}</span>
                        ${badge}
                    </div>
                    <span class="history-time">${h.time}</span>
                `;
                historyList.appendChild(item);
            });
        }

        // ===== 删除食物 =====
        window.removeFood = function(category, foodName) {
            foods[category] = foods[category].filter(f => (typeof f === 'object' ? f.name : f) !== foodName);
            if (foods[category].length === 0) delete foods[category];
            renderFoodList();
            updateStats();
        };

        // ===== 清空历史 =====
        function clearAllHistory() {
            history = [];
            localStorage.removeItem('foodHistory');
            renderHistory();
            updateStats();
            showToast('已清空');
        }

        // ===== 事件 =====
        drawBtn.addEventListener('click', draw);
        clearHistory.addEventListener('click', clearAllHistory);
        modalClose.addEventListener('click', () => modalOverlay.classList.remove('show'));
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('show'); });

        // ===== 启动 =====
        renderFoodList();
        renderHistory();
        updateStats();
    </script>
</body>
</html>
